<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        transition: 0.3s;
    }

    body.dark {
        background: linear-gradient(135deg, #1e1e2f, #2c2c54);
        color: white;
    }

    body.light {
        background: linear-gradient(135deg, #74ebd5, #acb6e5);
        color: black;
    }

    .container {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        justify-content: center;
    }

    .calculator {
        backdrop-filter: blur(15px);
        background: rgba(255, 255, 255, 0.1);
        padding: 20px;
        border-radius: 20px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    #display {
        width: 100%;
        height: 60px;
        font-size: 24px;
        border: none;
        border-radius: 10px;
        margin-bottom: 10px;
        text-align: right;
        padding: 10px;
    }

    .buttons {
        display: grid;
        grid-template-columns: repeat(5, 60px);
        gap: 10px;
    }

    button {
        height: 50px;
        font-size: 16px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: rgba(255,255,255,0.2);
    }

    button:hover {
        transform: scale(1.05);
    }

    .history {
    width: 260px;
    max-height: 400px;
    overflow-y: auto;
    padding: 15px;
    border-radius: 15px;
    background: rgba(255,255,255,0.12);
    font-size: 14px;
}

    .toggle {
        margin-bottom: 10px;
        cursor: pointer;
        padding: 5px 10px;
        border-radius: 10px;
        border: none;
    }

    /* Mobile Responsive */
    @media (max-width: 600px) {
        .buttons {
            grid-template-columns: repeat(4, 60px);
        }
        .history {
            width: 100%;
        }
    }
</style>
</head>

<body class="dark">

<div class="container">
    <div class="calculator">
        <button class="toggle" onclick="toggleMode()">Dark/Light</button>
        <input type="text" id="display" disabled>

        <div class="buttons">
            <button onclick="clearDisplay()">C</button>
            <button onclick="deleteLast()">DEL</button>
            <button onclick="appendValue('/')">/</button>
            <button onclick="appendValue('*')">*</button>
            <button onclick="appendValue('Math.sqrt(')">√</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('-')">-</button>
            <button onclick="appendPower()">xʸ</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('+')">+</button>
            <button onclick="appendValue('Math.sin(')">sin</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="calculate()">=</button>
            <button onclick="appendValue('Math.cos(')">cos</button>

            <button onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
            <button onclick="appendValue('Math.log(')">log</button>
            <button onclick="appendValue('Math.tan(')">tan</button>
        </div>
    </div>

    <div class="history">
        <h3>History</h3>
        <div id="historyList"></div>
    </div>
</div>

<script>
let display = document.getElementById("display");
let historyList = document.getElementById("historyList");

// Load history
window.onload = function() {
    let history = JSON.parse(localStorage.getItem("calcHistory")) || [];
    history.forEach(item => addHistory(item));
};

function appendValue(value) {
    display.value += value;
}

function appendPower() {
    let base = display.value;
    display.value = "Math.pow(" + base + ",";
}

function clearDisplay() {
    display.value = "";
}

function deleteLast() {
    display.value = display.value.slice(0, -1);
}

function calculate() {
    try {
        let expression = display.value;

        // Auto close brackets
        let openBrackets = (expression.match(/\(/g) || []).length;
        let closeBrackets = (expression.match(/\)/g) || []).length;

        while (openBrackets > closeBrackets) {
            expression += ")";
            closeBrackets++;
        }

        let result = eval(expression);
        display.value = result;

        let historyItem = expression + " = " + result;
        addHistory(historyItem);
        saveHistory(historyItem);

    } catch {
        display.value = "Error";
    }
}

function addHistory(text) {
    let div = document.createElement("div");
    div.style.display = "flex";
    div.style.justifyContent = "space-between";
    div.style.alignItems = "center";
    div.style.borderBottom = "1px solid rgba(255,255,255,0.2)";
    div.style.padding = "6px";

    let p = document.createElement("span");
    p.textContent = text;
    p.style.cursor = "pointer";
    p.style.flex = "1";

    // Click history to reuse calculation
    p.onclick = function() {
        display.value = text.split("=")[0];
    };

    let clearBtn = document.createElement("button");
    clearBtn.textContent = "Clear";
    clearBtn.style.marginLeft = "10px";
    clearBtn.style.padding = "3px 8px";
    clearBtn.style.border = "none";
    clearBtn.style.borderRadius = "6px";
    clearBtn.style.background = "#ff4757";
    clearBtn.style.color = "white";
    clearBtn.style.cursor = "pointer";

    clearBtn.onclick = function() {
        div.remove();
        deleteFromStorage(text);
    };

    div.appendChild(p);
    div.appendChild(clearBtn);
    historyList.prepend(div);
}

function saveHistory(text) {
    let history = JSON.parse(localStorage.getItem("calcHistory")) || [];
    history.unshift(text);
    localStorage.setItem("calcHistory", JSON.stringify(history));
}

function deleteFromStorage(text) {
    let history = JSON.parse(localStorage.getItem("calcHistory")) || [];
    history = history.filter(item => item !== text);
    localStorage.setItem("calcHistory", JSON.stringify(history));
}

function clearHistory() {
    localStorage.removeItem("calcHistory");
    historyList.innerHTML = "";
}

// Keyboard Support
document.addEventListener("keydown", function(event) {
    let key = event.key;

    if (!isNaN(key) || key === "." || key === "+" || key === "-" || key === "*" || key === "/") {
        appendValue(key);
    } else if (key === "Enter") {
        calculate();
    } else if (key === "Backspace") {
        deleteLast();
    } else if (key === "Escape") {
        clearDisplay();
    }
});

// Dark/Light Mode
function toggleMode() {
    document.body.classList.toggle("dark");
    document.body.classList.toggle("light");
}
</script>
</body>
</html>
